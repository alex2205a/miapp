<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Zonas WiFi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .modal-content { background: white; border-radius: 1rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 2rem; }
        .btn-primary { background: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #e5e7eb; color: #374151; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        .btn-outline:hover { background: #3b82f6; color: white; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .badge-tipo { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .badge-salon { background: #dbeafe; color: #1e40af; }
        .badge-libre { background: #d1fae5; color: #065f46; }
        .flex-center { display: flex; align-items: center; gap: 0.5rem; }
        .btn-wifi { background: #0ea5e9; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-wifi:hover { background: #0284c7; }
        .btn-wifi-manual { background: #8b5cf6; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-wifi-manual:hover { background: #7c3aed; }
        .mensaje-exito { color: #16a34a; }
        .mensaje-error { color: #dc2626; }
        .mensaje-info { color: #f59e0b; }
    </style>
</head>
<body>

    <div id="modal-zona" class="modal">
        <div class="modal-content fade-in">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modal-titulo" class="text-xl font-bold text-slate-800">Nueva Zona WiFi</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-slate-600 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="form-zona" onsubmit="guardarZona(event)">
                <input type="hidden" id="zona-id" value="">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Nombre de la zona</label>
                        <input type="text" id="nombre_zona" required
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                               placeholder="Ej: Salón 101">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">BSSID MAC</label>
                        <div class="flex gap-2">
                            <input type="text" id="bssid_mac" required
                                   class="flex-1 px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                   placeholder="AA:BB:CC:DD:EE:FF">
                            <button type="button" onclick="copiarBSSID()" class="btn-outline text-sm px-3 py-2" title="Copiar BSSID">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                        <div class="mt-2 flex gap-2 flex-wrap items-center">
                            <button type="button" onclick="escanearyRellenarBSSID()" class="btn-wifi text-sm px-4 py-2 rounded-lg">
                                <i class="fas fa-wifi mr-1"></i> Escanear red actual
                            </button>
                            <button type="button" onclick="ingresarBSSIDManual()" class="btn-wifi-manual text-sm px-4 py-2 rounded-lg">
                                <i class="fas fa-pen mr-1"></i> Ingresar manual
                            </button>
                            <button type="button" onclick="mostrarAyuda()" class="text-sm text-blue-500 hover:underline">
                                <i class="fas fa-question-circle mr-1"></i> ¿Cómo obtener el BSSID?
                            </button>
                        </div>
                        <div id="mensaje-bssid" class="text-xs text-slate-500 mt-1"></div>
                        <p class="text-xs text-slate-400 mt-1">Dirección MAC del router/AP del salón</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Tipo</label>
                        <select id="tipo_zona" required
                                class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                            <option value="salon">Salón</option>
                            <option value="libre">Libre</option>
                        </select>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="submit" class="btn-primary flex-1">
                            <i class="fas fa-save mr-2"></i> Guardar
                        </button>
                        <button type="button" onclick="cerrarModal()" class="btn-secondary">
                            Cancelar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                    <i class="fas fa-wifi text-green-500"></i> Gestión de Zonas WiFi
                </h1>
                <p class="text-sm text-slate-500 mt-1">Administra las redes WiFi de los salones</p>
            </div>
            <button onclick="abrirModal()" class="btn-primary">
                <i class="fas fa-plus mr-2"></i> Nueva Zona
            </button>
        </div>

        <div class="table-container overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold text-slate-600">Nombre</th>
                        <th class="px-4 py-3 text-left font-semibold text-slate-600">BSSID MAC</th>
                        <th class="px-4 py-3 text-left font-semibold text-slate-600">Tipo</th>
                        <th class="px-4 py-3 text-center font-semibold text-slate-600">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-zonas">
                    <tr><td colspan="4" class="text-center py-8 text-slate-400">Cargando zonas...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            let zonasData = [];

            async function cargarZonas() {
                try {
                    const response = await fetch('/api/admin/zonas-wifi');
                    if (!response.ok) throw new Error('Error al cargar zonas');
                    zonasData = await response.json();
                    renderizarTabla(zonasData);
                } catch (error) {
                    document.getElementById('tabla-zonas').innerHTML = `
                        <tr><td colspan="4" class="text-center py-8 text-red-500">Error: ${error.message}</td></tr>
                    `;
                }
            }

            function renderizarTabla(zonas) {
                const tbody = document.getElementById('tabla-zonas');
                if (zonas.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-400">No hay zonas WiFi registradas</td></tr>`;
                    return;
                }
                tbody.innerHTML = zonas.map(z => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                        <td class="px-4 py-3 font-medium text-slate-700">${z.nombre}</td>
                        <td class="px-4 py-3 font-mono text-sm text-slate-600">${z.bssid}</td>
                        <td class="px-4 py-3"><span class="badge-tipo ${z.tipo === 'salon' ? 'badge-salon' : 'badge-libre'}">${z.tipo}</span></td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="window.editarZona(${z.id})" class="text-blue-500 hover:text-blue-700 mr-2" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="window.eliminarZona(${z.id})" class="text-red-500 hover:text-red-700" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }

            // ============================================================
            // FUNCIONES DE AYUDA PARA BSSID
            // ============================================================
            window.copiarBSSID = function() {
                const input = document.getElementById('bssid_mac');
                if (!input.value) {
                    alert('No hay BSSID para copiar');
                    return;
                }
                navigator.clipboard.writeText(input.value).then(() => {
                    alert('✅ BSSID copiado al portapapeles');
                }).catch(() => {
                    input.select();
                    document.execCommand('copy');
                    alert('✅ BSSID copiado (selección manual)');
                });
            };

            window.mostrarAyuda = function() {
                alert(
                    '🔍 Cómo obtener el BSSID de tu red WiFi:\n\n' +
                    '📌 En Windows:\n' +
                    '   Abre CMD y ejecuta: netsh wlan show interfaces | findstr BSSID\n' +
                    '   Copia el valor (ej: 00:11:22:33:44:55)\n\n' +
                    '📌 En macOS:\n' +
                    '   Abre Terminal y ejecuta: /System/Library/PrivateFrameworks/Apple80211.framework/Versions/Current/Resources/airport -I\n' +
                    '   Busca "BSSID"\n\n' +
                    '📌 En Linux:\n' +
                    '   Abre Terminal y ejecuta: iwconfig | grep "Access Point"\n\n' +
                    '📌 En Android:\n' +
                    '   Ve a Ajustes → WiFi → Red conectada\n' +
                    '   La MAC suele aparecer en detalles.\n\n' +
                    '📌 En iPhone/iPad:\n' +
                    '   Ve a Ajustes → General → Información → WiFi\n' +
                    '   Busca la dirección MAC.\n\n' +
                    '📌 En router:\n' +
                    '   La MAC suele estar impresa en una etiqueta en el dispositivo.\n\n' +
                    '📌 Formato correcto: AA:BB:CC:DD:EE:FF'
                );
            };

            // ============================================================
            // 🔥 FUNCIÓN PARA INGRESAR BSSID MANUALMENTE
            // ============================================================
            window.ingresarBSSIDManual = function() {
                const bssid = prompt(
                    '📋 Ingresa el BSSID de tu red WiFi:\n\n' +
                    'Formato: AA:BB:CC:DD:EE:FF\n\n' +
                    '💡 Cómo obtenerlo:\n' +
                    '• Windows: netsh wlan show interfaces | findstr BSSID\n' +
                    '• Mac: /System/Library/PrivateFrameworks/Apple80211.framework/Versions/Current/Resources/airport -I\n' +
                    '• Linux: iwconfig | grep "Access Point"\n' +
                    '• Router: Busca la etiqueta con la dirección MAC'
                );
                
                if (bssid === null) {
                    return;
                }
                
                const bssidLimpio = bssid.trim().toUpperCase();
                const valido = /^([0-9A-F]{2}[:-]){5}([0-9A-F]{2})$/i.test(bssidLimpio);
                
                if (valido) {
                    document.getElementById('bssid_mac').value = bssidLimpio;
                    const mensaje = document.getElementById('mensaje-bssid');
                    mensaje.innerHTML = `✅ BSSID ingresado manualmente: <strong>${bssidLimpio}</strong>`;
                    mensaje.className = 'text-xs text-green-600';
                } else {
                    alert('❌ Formato inválido.\n\n' +
                          'El formato debe ser: AA:BB:CC:DD:EE:FF\n' +
                          'Ejemplo: 00:11:22:33:44:55\n\n' +
                          'Asegúrate de usar solo números y letras (A-F).');
                }
            };

            // ============================================================
            // 🔥 ESCANEAR BSSID - VERSIÓN MEJORADA (AUTOMÁTICA EN RENDER)
            // ============================================================
            window.escanearyRellenarBSSID = async function() {
                const mensaje = document.getElementById('mensaje-bssid');
                mensaje.innerHTML = '🔍 Intentando obtener BSSID...';
                mensaje.className = 'text-xs text-blue-500';

                try {
                    // 🔥 PASO 1: Intentar con la API de WiFi del navegador (más rápido)
                    if ('wifi' in navigator) {
                        mensaje.innerHTML = '📡 Escaneando redes WiFi disponibles...';
                        
                        try {
                            // Intentar escanear redes
                            const wifi = await navigator.wifi.scan();
                            
                            if (wifi.networks && wifi.networks.length > 0) {
                                // Buscar la red con mejor señal (la más probable)
                                const mejorRed = wifi.networks.reduce((mejor, actual) => {
                                    return (actual.signalStrength > mejor.signalStrength) ? actual : mejor;
                                }, wifi.networks[0]);
                                
                                if (mejorRed && mejorRed.bssid) {
                                    document.getElementById('bssid_mac').value = mejorRed.bssid;
                                    mensaje.innerHTML = `✅ BSSID detectado automáticamente: <strong>${mejorRed.bssid}</strong> (${mejorRed.ssid || 'Red'})`;
                                    mensaje.className = 'text-xs text-green-600';
                                    return;
                                }
                            }
                        } catch (wifiError) {
                            console.log('API WiFi no disponible o sin permisos:', wifiError);
                        }
                    }

                    // 🔥 PASO 2: Intentar con geolocalización
                    if ('geolocation' in navigator) {
                        mensaje.innerHTML = '📍 Obteniendo ubicación para detectar red...';
                        
                        try {
                            const position = await new Promise((resolve, reject) => {
                                navigator.geolocation.getCurrentPosition(resolve, reject, {
                                    enableHighAccuracy: true,
                                    timeout: 10000
                                });
                            });
                            
                            // Enviar coordenadas al servidor
                            const response = await fetch('/api/admin/bssid-por-ubicacion', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    lat: position.coords.latitude,
                                    lng: position.coords.longitude
                                })
                            });
                            
                            const data = await response.json();
                            if (data.success && data.bssid) {
                                document.getElementById('bssid_mac').value = data.bssid;
                                mensaje.innerHTML = `✅ BSSID detectado por ubicación: <strong>${data.bssid}</strong>`;
                                mensaje.className = 'text-xs text-green-600';
                                return;
                            }
                        } catch (geoError) {
                            console.log('Geolocalización no disponible:', geoError);
                        }
                    }

                    // 🔥 PASO 3: Intentar con el servidor (por si tiene BSSID)
                    mensaje.innerHTML = '🖥️ Consultando al servidor...';
                    const response = await fetch('/api/admin/bssid-actual');
                    const data = await response.json();
                    
                    if (data.success && data.bssid) {
                        document.getElementById('bssid_mac').value = data.bssid;
                        mensaje.innerHTML = `✅ BSSID obtenido del servidor: <strong>${data.bssid}</strong>`;
                        mensaje.className = 'text-xs text-green-600';
                        return;
                    }

                    // ❌ Si todo falla, mostrar mensaje con opción manual
                    mensaje.innerHTML = `
                        ⚠️ <strong>No se pudo obtener el BSSID automáticamente.</strong><br>
                        <span class="text-slate-500">Haz clic en "Ingresar manual" para pegar el BSSID.</span>
                        <br><span class="text-xs text-slate-400">💡 Asegúrate de estar conectado a una red WiFi y haber dado permisos.</span>
                    `;
                    mensaje.className = 'text-xs text-yellow-600';

                } catch (error) {
                    console.error('Error escaneando BSSID:', error);
                    mensaje.innerHTML = `
                        ⚠️ Error al escanear: ${error.message}<br>
                        <span class="text-slate-500">Haz clic en "Ingresar manual" para pegar el BSSID.</span>
                    `;
                    mensaje.className = 'text-xs text-yellow-600';
                }
            };

            // ============================================================
            // MODALES Y CRUD
            // ============================================================
            window.abrirModal = function(zona = null) {
                const modal = document.getElementById('modal-zona');
                modal.classList.add('open');
                const mensaje = document.getElementById('mensaje-bssid');
                mensaje.innerHTML = '';
                mensaje.className = 'text-xs text-slate-500';
                if (zona) {
                    document.getElementById('modal-titulo').textContent = 'Editar Zona WiFi';
                    document.getElementById('zona-id').value = zona.id;
                    document.getElementById('nombre_zona').value = zona.nombre;
                    document.getElementById('bssid_mac').value = zona.bssid;
                    document.getElementById('tipo_zona').value = zona.tipo;
                } else {
                    document.getElementById('modal-titulo').textContent = 'Nueva Zona WiFi';
                    document.getElementById('zona-id').value = '';
                    document.getElementById('nombre_zona').value = '';
                    document.getElementById('bssid_mac').value = '';
                    document.getElementById('tipo_zona').value = 'salon';
                }
            };

            window.cerrarModal = function() {
                document.getElementById('modal-zona').classList.remove('open');
            };

            window.editarZona = function(id) {
                const zona = zonasData.find(z => z.id === id);
                if (zona) window.abrirModal(zona);
            };

            window.guardarZona = async function(e) {
                e.preventDefault();
                const id = document.getElementById('zona-id').value;
                const nombre_zona = document.getElementById('nombre_zona').value.trim();
                const bssid_mac = document.getElementById('bssid_mac').value.trim().toUpperCase();
                const tipo_zona = document.getElementById('tipo_zona').value;

                if (!/^([0-9A-F]{2}[:-]){5}([0-9A-F]{2})$/.test(bssid_mac)) {
                    alert('⚠️ Formato de BSSID inválido. Usa formato AA:BB:CC:DD:EE:FF');
                    return;
                }

                const data = { nombre_zona, bssid_mac, tipo_zona };
                const url = id ? `/api/admin/zona-wifi/${id}` : '/api/admin/zona-wifi';
                const method = id ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    const result = await response.json();
                    if (!response.ok) {
                        alert('❌ Error: ' + (result.detail || result.message));
                        return;
                    }
                    alert('✅ ' + result.message);
                    window.cerrarModal();
                    cargarZonas();
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            };

            window.eliminarZona = async function(id) {
                if (!confirm('¿Seguro que quieres eliminar esta zona WiFi?')) return;
                try {
                    const response = await fetch(`/api/admin/zona-wifi/${id}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (!response.ok) {
                        alert('❌ Error: ' + result.detail);
                        return;
                    }
                    alert('✅ ' + result.message);
                    cargarZonas();
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            };

            // ============================================================
            // INICIALIZAR
            // ============================================================
            cargarZonas();
        })();
    </script>
</body>
</html>
