        .sidebar-link {

        @media (max-width: 768px) {

                top: 0;
                height: 100vh;
                z-index: 50;
                transition: left 0.3s ease;
            }
            .sidebar-mobile.open { left: 0; }
            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);

            }
            .overlay.open { display: block; }

        const adminId = localStorage.getItem('admin_id');

        function actualizarUI() {
            document.getElementById('nombre-admin').textContent = nombreAdmin;
            document.getElementById('matricula-admin').textContent = matriculaAdmin;
            const inicial = nombreAdmin.charAt(0).toUpperCase();
            document.getElementById('avatar-admin').textContent = inicial;
            document.getElementById('avatar-movil').textContent = inicial;
        }
        actualizarUI();

        if (!adminId) {
            window.location.href = '/login';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        document.querySelectorAll('.sidebar-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) toggleSidebar();
            });
        });

        function setActiveTab(tabId) {
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

async function cargarUsuarios() {

    const contenedor = document.getElementById('contenido-principal');

    contenedor.innerHTML = `
        <div class="flex items-center justify-center h-64">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-slate-500">Cargando usuarios...</p>
            </div>
        </div>
    `;


    try {

        const response = await fetch('/admin/usuarios', {cache:'no-cache'});


        if(!response.ok){
            throw new Error(`HTTP ${response.status}`);
        }


        const html = await response.text();

        contenedor.innerHTML = html;



        // Ejecutar JS del archivo cargado
        const scripts = contenedor.querySelectorAll('script');

        scripts.forEach(oldScript=>{

            const nuevo = document.createElement('script');

            if(oldScript.src){
                nuevo.src = oldScript.src;
            }else{
                nuevo.textContent = oldScript.textContent;
            }

            document.body.appendChild(nuevo);

        });


        console.log("Usuarios cargados correctamente");


    }catch(error){

        contenedor.innerHTML=`

        <div class="bg-red-100 p-6 rounded-xl text-red-700">

            Error cargando usuarios:
            ${error.message}

        </div>

        `;

    }

}

async function cargarVista(url, contenedorId) {
    const contenedor = document.getElementById(contenedorId);
    // Limpiar scripts anteriores (opcional, pero ayuda)
    const oldScripts = contenedor.querySelectorAll('script');
    oldScripts.forEach(script => script.remove());

    contenedor.innerHTML = `<div class="flex items-center justify-center h-64"><div class="text-center"><i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i><p class="text-slate-500">Cargando...</p></div></div>`;

    try {
        const response = await fetch(url, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        contenedor.innerHTML = html;

        // Ejecutar los scripts del contenido
        const scripts = contenedor.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            newScript.textContent = oldScript.textContent;
            if (oldScript.src) newScript.src = oldScript.src;
            if (oldScript.type) newScript.type = oldScript.type;
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });

        console.log(`✅ Vista cargada: ${url}`);
    } catch (error) {
        contenedor.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-2xl p-8 text-center"><i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i><h3 class="text-lg font-semibold text-red-700">Error al cargar</h3><p class="text-red-500 text-sm">${error.message}</p><button onclick="cargarVista('${url}','${contenedorId}')" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition"><i class="fas fa-redo"></i> Reintentar</button></div>`;
    }
}
