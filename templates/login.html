<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-chalkboard-teacher text-3xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Control Escolar</h1>
            <p class="text-gray-500 text-sm mt-1">Inicia sesión como Maestro</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Matrícula</label>
                <input 
                    type="text" 
                    id="matricula" 
                    placeholder="Ingresa tu matrícula"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                    required
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition duration-200"
            >
                Iniciar Sesión
            </button>
        </form>

        <div id="errorMsg" class="mt-4 text-red-600 text-sm text-center hidden"></div>

        <p class="text-center text-sm text-gray-500 mt-6">
            ¿Eres alumno? 
            <a href="#" class="text-blue-600 hover:underline">Accede aquí</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const matricula = document.getElementById('matricula').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!matricula) {
                errorMsg.textContent = 'Por favor ingresa tu matrícula';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/maestro/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matricula })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = data.detail || 'Error al iniciar sesión';
                    errorMsg.classList.remove('hidden');
                    return;
                }

               if (data.rol === 'administrador') {
    localStorage.setItem('admin_id', data.id);
    localStorage.setItem('admin_nombre', data.nombre);
    localStorage.setItem('admin_matricula', data.matricula);
    window.location.href = '/admin/dashboard';
} else {
    localStorage.setItem('maestro_id', data.id);
    localStorage.setItem('maestro_nombre', data.nombre);
    localStorage.setItem('maestro_matricula', data.matricula);
    window.location.href = '/panel-maestro';
}
               

            } catch (error) {
                errorMsg.textContent = 'Error de conexión. Verifica el servidor.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
