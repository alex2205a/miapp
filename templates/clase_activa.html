<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .badge-presente {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.3); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .badge-ausente {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 20px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .actualizando { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .countdown-badge {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="w-full max-w-3xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/70 border border-slate-200/60 overflow-hidden">
            
            <!-- HEADER -->
            <div class="bg-gradient-to-r from-slate-800 to-slate-700 px-6 py-5 flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center space-x-3">
                    <div class="bg-emerald-500/20 p-2 rounded-full">
                        <i class="fas fa-users text-emerald-400 text-xl"></i>
                    </div>
                    <div>
                        <h1 id="titulo-clase" class="text-xl font-semibold text-white tracking-tight flex items-center gap-2">
                            <span>Clase #<span id="clase-id-label">{{ clase_id }}</span></span>
                            <span class="inline-flex items-center gap-1.5 bg-emerald-500/30 text-emerald-200 text-xs font-medium px-3 py-1 rounded-full border border-emerald-400/30">
                                <span class="relative flex h-2 w-2">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                </span>
                                EN VIVO
                            </span>
                        </h1>
                        <p class="text-slate-300 text-sm flex items-center gap-2 mt-0.5">
                            <i class="fas fa-sync-alt text-emerald-400 text-xs" id="icono-sync"></i>
                            <span id="texto-actualizacion">Actualizando cada 15s</span>
                            <span class="text-slate-400 text-xs ml-1 countdown-badge px-2 py-0.5 rounded-full" id="countdown-timer">15s</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-2 bg-slate-700/50 px-3 py-1.5 rounded-full border border-slate-600/50">
                    <i class="fas fa-user-check text-emerald-400 text-sm"></i>
                    <span class="text-slate-200 text-sm font-medium" id="contador-presentes">0 presentes</span>
                </div>
            </div>

            <!-- CUERPO -->
            <div class="p-5 md:p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-list-ul text-slate-400"></i>
                        Lista de alumnos
                    </h2>
                    <span class="text-xs text-slate-400 bg-slate-100 px-3 py-1 rounded-full" id="total-alumnos">0</span>
                </div>

                <div id="mensaje-ayuda" class="text-sm text-gray-500 mb-3"></div>

                <div class="max-h-96 overflow-y-auto scrollbar-thin pr-1 -mr-1">
                    <ul id="lista-alumnos" class="divide-y divide-slate-100">
                        <!-- Cargado por JavaScript -->
                    </ul>
                </div>

                <div class="mt-5 pt-4 border-t border-slate-100 flex justify-between items-center text-sm text-slate-500">
                    <div class="flex items-center gap-3">
                        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span>Presente</span>
                        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-400 inline-block"></span>Ausente</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="cerrarSesion()" class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-door-closed"></i> Cerrar Sesión
                        </button>
                        <div class="flex items-center gap-1 bg-slate-50 px-3 py-1 rounded-full">
                            <i class="fas fa-clock text-slate-400 text-xs"></i>
                            <span class="text-xs font-mono text-slate-400" id="hora-actual"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ===== CONFIGURACIÓN INICIAL =====
        // ============================================
        const claseId = window.location.pathname.split('/').pop();
        const INTERVALO_ACTUALIZACION = 15;
        let segundosRestantes = INTERVALO_ACTUALIZACION;
        let sesionIdGlobal = null; // <--- ¡ESTO ES CLAVE!

        // Actualizar hora
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('hora-actual').textContent = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        actualizarHora();
        setInterval(actualizarHora, 1000);

        // ============================================
        // ===== FUNCIÓN: MARCAR MANUALMENTE =====
        // ============================================
        async function marcarManual(alumnoId) {
            if (!sesionIdGlobal) {
                alert('⚠️ No hay sesión activa para marcar asistencia.');
                return;
            }

            if (!confirm('¿Seguro que quieres marcar a este alumno como presente?')) return;

            try {
                const response = await fetch('/api/asistencia/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        alumno_id: alumnoId,
                        sesion_id: sesionIdGlobal
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert('❌ Error: ' + data.detail);
                    return;
                }

                alert('✅ Asistencia registrada manualmente');
                actualizarAsistencia(); // Recargar lista

            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================
        // ===== CERRAR SESIÓN =====
        // ============================================
        async function cerrarSesion() {
            if (!confirm('¿Seguro que quieres cerrar la sesión?')) return;

            try {
                if (!sesionIdGlobal) {
                    alert('No se encontró la sesión activa');
                    return;
                }

                const response = await fetch(`/api/sesiones/cerrar/${sesionIdGlobal}`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (!response.ok) {
                    alert('Error: ' + data.detail);
                    return;
                }

                alert('Sesión cerrada correctamente');
                window.location.href = '/panel-maestro';

            } catch (error) {
                alert('Error al cerrar la sesión');
            }
        }

        // ============================================
        // ===== VERIFICAR CIERRE AUTOMÁTICO =====
        // ============================================
        async function verificarCierreAutomatico() {
            try {
                const response = await fetch('/api/sesiones/cerrar-automaticas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.total > 0) {
                    const sesionCerrada = data.sesiones_cerradas.find(s => s.sesion_id == sesionIdGlobal);
                    if (sesionCerrada) {
                        alert('⏰ La sesión ha finalizado automáticamente');
                        window.location.href = '/panel-maestro';
                    }
                }
            } catch (error) {
                console.error('Error al verificar cierre:', error);
            }
        }

        // ============================================
        // ===== OBTENER ASISTENCIA =====
        // ============================================
        async function actualizarAsistencia() {
            try {
                const iconoSync = document.getElementById('icono-sync');
                const textoActualizacion = document.getElementById('texto-actualizacion');
                
                iconoSync.classList.add('actualizando');
                textoActualizacion.textContent = 'Actualizando...';

                const res = await fetch(`/api/clase/asistencia/${claseId}`);
                if (!res.ok) throw new Error(`Error ${res.status}`);
                
                const alumnos = await res.json();

                if (!Array.isArray(alumnos)) throw new Error('Datos inválidos');

                const presentes = alumnos.filter(a => a.estado === 'presente').length;
                const total = alumnos.length;

                // Guardar sesion_id GLOBALMENTE
                sesionIdGlobal = alumnos[0]?.sesion_id || null;

                // Renderizar alumnos
                let html = '';
                if (alumnos.length === 0) {
                    html = '<li class="py-8 text-center text-slate-400">No hay alumnos inscritos en esta clase</li>';
                } else {
                    html = alumnos.map((alumno, index) => {
                        const esPresente = alumno.estado === 'presente';
                        const badgeClass = esPresente ? 'badge-presente' : 'badge-ausente';
                        const icono = esPresente ? 'fa-check-circle' : 'fa-times-circle';
                        const textoEstado = esPresente ? 'Presente' : 'Ausente';
                        const delay = index * 30;
                        
                        // Botón "Marcar manual" (solo si está ausente y hay sesión activa)
                        let botonManual = '';
                        if (!esPresente && sesionIdGlobal) {
                            botonManual = `
                                <button onclick="marcarManual('${alumno.alumno_id}')" 
                                        class="text-xs bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded transition ml-2">
                                    <i class="fas fa-user-plus"></i> Marcar
                                </button>
                            `;
                        }
                        
                        return `
                            <li class="py-3.5 flex items-center justify-between gap-3 hover:bg-slate-50/80 px-2 rounded-lg transition-all duration-200" 
                                style="animation: fadeIn 0.2s ease ${delay}ms both;">
                                <div class="flex items-center gap-3 min-w-0">
                                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-sm font-medium flex-shrink-0">
                                        ${alumno.nombre ? alumno.nombre.charAt(0).toUpperCase() : '?'}
                                    </div>
                                    <span class="font-medium text-slate-700 truncate">${alumno.nombre || 'Sin nombre'}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    ${alumno.hora_registro ? `<span class="text-xs text-slate-400">${new Date(alumno.hora_registro).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</span>` : ''}
                                    <span class="px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5 ${badgeClass}">
                                        <i class="fas ${icono} text-xs"></i>
                                        ${textoEstado}
                                    </span>
                                    ${botonManual}
                                </div>
                            </li>
                        `;
                    }).join('');
                }

                document.getElementById('lista-alumnos').innerHTML = html;
                document.getElementById('contador-presentes').textContent = `${presentes} presentes`;
                document.getElementById('total-alumnos').textContent = `${total}`;

                const ahora = new Date();
                textoActualizacion.textContent = `Última: ${ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('lista-alumnos').innerHTML = `
                    <li class="py-8 text-center text-red-400">
                        <i class="fas fa-exclamation-triangle text-2xl block mb-2"></i>
                        Error al cargar asistencia: ${error.message}
                        <button onclick="actualizarAsistencia()" class="mt-2 text-xs bg-red-100 text-red-600 px-4 py-1.5 rounded-full">
                            Reintentar
                        </button>
                    </li>
                `;
            } finally {
                document.getElementById('icono-sync').classList.remove('actualizando');
                segundosRestantes = INTERVALO_ACTUALIZACION;
                document.getElementById('countdown-timer').textContent = `${segundosRestantes}s`;
            }
        }

        // ============================================
        // ===== INICIALIZAR =====
        // ============================================
        actualizarAsistencia();
        setInterval(actualizarAsistencia, INTERVALO_ACTUALIZACION * 1000);
        setInterval(verificarCierreAutomatico, 30000);
        
    </script>
</body>
</html>
